name: Release Rust Tool

on:
  pull_request:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  check:
    name: Check
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cargo test --locked

  build-release:
    name: Build ${{ matrix.target }}
    needs: check
    if: github.ref_type == 'tag'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary_path: target/x86_64-unknown-linux-gnu/release/harmony-midi
            artifact_name: harmony-midi-x86_64-unknown-linux-gnu
            archive_ext: .tar.gz
          - runner: macos-14
            target: aarch64-apple-darwin
            binary_path: target/aarch64-apple-darwin/release/harmony-midi
            artifact_name: harmony-midi-aarch64-apple-darwin
            archive_ext: .tar.gz
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            binary_path: target/x86_64-pc-windows-msvc/release/harmony-midi.exe
            artifact_name: harmony-midi-x86_64-pc-windows-msvc
            archive_ext: .zip

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Restore Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --bin harmony-midi --target "${{ matrix.target }}"

      - name: Stage release files
        shell: bash
        run: |
          rm -rf release-package
          mkdir -p release-package/harmony-midi
          cp "${{ matrix.binary_path }}" release-package/harmony-midi/
          cp README.md LICENSE release-package/harmony-midi/

      - name: Create tarball
        if: matrix.archive_ext == '.tar.gz'
        shell: bash
        run: |
          archive_name="harmony-midi-${GITHUB_REF_NAME}-${{ matrix.target }}.tar.gz"
          tar -C release-package -czf "${archive_name}" harmony-midi
          echo "ARCHIVE_NAME=${archive_name}" >> "${GITHUB_ENV}"

      - name: Create zip archive
        if: matrix.archive_ext == '.zip'
        shell: pwsh
        run: |
          $archiveName = "harmony-midi-$env:GITHUB_REF_NAME-${{ matrix.target }}.zip"
          Compress-Archive -Path "release-package/harmony-midi" -DestinationPath $archiveName
          "ARCHIVE_NAME=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Upload packaged artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ env.ARCHIVE_NAME }}
          if-no-files-found: error

  publish-release:
    name: Publish release
    needs: build-release
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release create "${GITHUB_REF_NAME}" release-artifacts/*/* --generate-notes
